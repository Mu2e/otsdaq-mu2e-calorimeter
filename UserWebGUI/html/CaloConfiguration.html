<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>Calorimeter Configuration</title>

	<link href='/WebPath/css/fonts.css?family=Inconsolata:400' rel='stylesheet' type='text/css'>

	<link rel="stylesheet" type="text/css" href="/WebPath/css/ConfigurationGUI.css">
	<link rel="stylesheet" type="text/css" href="/WebPath/UserWebPath/WebGUI_calo/css/CaloConfiguration.css">

	<script type="text/JavaScript" src="/WebPath/js/Globals.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/Debug.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/DesktopContent.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/js_lib/SimpleContextMenu.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/js_lib/ConfigurationAPI.js"></script>

	<script>

		///////////////////////////////////////////////////////////////////////////////
		// Calorimeter Configuration GUI
		//
		// Shifter-friendly interface to select configuration files and write
		// them to the ots MongoDB configuration tables via ConfigurationAPI.
		// No FE interface or configured State Machine required.
		//
		// FSM-scoped: a global FSM dropdown selects which FSM's set of
		// configuration files is active. Each FSM keeps its own four file
		// selections in localStorage, so switching FSMs swaps the displayed
		// selections. The last-used FSM is restored on page load.
		//
		// File lists fetched via CodeEditor read-only API.
		///////////////////////////////////////////////////////////////////////////////

		// CodeEditorSupervisor application id (resolved at init() from the gateway)
		var _codeEditorAppId = 0;

		// localStorage layout:
		//   CaloConfig_lastFsm                              -> name of last-active FSM
		//   CaloConfig_fsm.<fsmName>.<sectionId>            -> selected fileName for that FSM+section
		//   CaloConfig_alias.<fsmName>                      -> selected alias for that FSM
		//   CaloConfig_dir.<sectionId>                      -> user-overridden directory (full path)
		// Legacy keys "CaloConfig_<sectionId>" (pre-FSM) are migrated on first load.
		var LOCALSTORAGE_PREFIX_     = "CaloConfig_";
		var LOCALSTORAGE_LAST_FSM_   = LOCALSTORAGE_PREFIX_ + "lastFsm";
		var LOCALSTORAGE_FSM_PREFIX_ = LOCALSTORAGE_PREFIX_ + "fsm.";
		var LOCALSTORAGE_ALIAS_PREFIX_ = LOCALSTORAGE_PREFIX_ + "alias.";
		var LOCALSTORAGE_DIR_PREFIX_ = LOCALSTORAGE_PREFIX_ + "dir.";
		var BOARD_CONFIG_BASE_PATH_  = "/otsdaq-mu2e-calorimeter/boardConfig/configurations";

		// Populated at init() from getStateMachineNames. Always has at least one entry.
		var _fsmNameArr   = [];
		var _activeFsm    = "";
		// Aliases per FSM: { fsmName: [alias1, alias2, ...] }
		var _aliasesPerFsm = {};
		var _activeAlias  = "";
		// Cached file lists per section: { sectionId: [fileName, ...] } so FSM
		// switches don't re-fetch the CodeEditor directory listing.
		var _fileListCache_ = {};

		// CSV-to-table mapping is auto-discovered from the table schema at runtime:
		//   * column 0 of each CSV row = the UID column value (BoardID)
		//   * columns 1.. of the CSV row = the "data" columns of the table,
		//     in schema order, skipping auto-managed columns
		//     (UID, Comment, Author, Timestamp).
		// So there is no per-section field list here; we just need the table path.
		var CONFIG_SECTIONS_ = [
			{
				id:             "voltages",
				title:          "SiPM Voltages",
				description:    "Per-board SiPM bias voltage settings.",
				boardConfigDir: "voltages",
				mongoTable:     "/SubsystemCalorimeterVoltagesTable",
			},
			{
				id:             "thresholds",
				title:          "ADC Thresholds",
				description:    "Per-channel ADC threshold values.",
				boardConfigDir: "thresholds",
				mongoTable:     "/SubsystemCalorimeterThresholdsTable",
			},
			{
				id:             "mezzanine",
				title:          "Mezzanine Config",
				description:    "Mezzanine board configuration parameters.",
				boardConfigDir: "mezzanine",
				mongoTable:     "/SubsystemCalorimeterMZBCalibsTable",
			},
			{
				id:             "deadhot",
				title:          "Dead-Hot Map",
				description:    "Channel dead/hot quality map.",
				boardConfigDir: "channelstatus",
				mongoTable:     "/SubsystemCalorimeterStatusTable",
			},
		];

		var modifiedTablesMap_ = {};


		///////////////////////////////////////////////////////////////////////////
		function init()
		{
			Debug.log("CaloConfiguration init");
			DesktopContent.tooltip("Calo Configuration",
				"Pick an FSM, then select config files and save them to the ots configuration tables. " +
				"Each FSM remembers its own four file selections.");
			DesktopContent.setWindowTooltip(
				"FSM-scoped configuration: each FSM has its own four file selections.");

			paintFsmBar();
			paintSections();

			//Kick off the "Active" line lookup for every section in parallel.
			//It only needs the Configuration API (not the FSM list or
			//CodeEditor), so we don't have to wait for those resolutions.
			refreshAllActiveLines();

			//1) get FSM names, 2) resolve CodeEditor app id, 3) load file lists
			DesktopContent.XMLHttpRequest(
				"Request?RequestType=getStateMachineNames",
				"",
				function(fsmReq)
				{
					var nodes = (fsmReq && fsmReq.responseXML)
						? fsmReq.responseXML.getElementsByTagName("stateMachineName")
						: [];
					_fsmNameArr = [];
					for (var i = 0; i < nodes.length; ++i)
					{
						var v = nodes[i].getAttribute("value");
						if (v && v !== "No FSM Records")
							_fsmNameArr.push(v);
					}
					if (!_fsmNameArr.length)
						_fsmNameArr = ["Default"]; //local fallback so the GUI still works

					//pick active FSM: last-used if still present, else first
					var savedFsm = localStorage.getItem(LOCALSTORAGE_LAST_FSM_);
					_activeFsm = (savedFsm && _fsmNameArr.indexOf(savedFsm) >= 0)
						? savedFsm : _fsmNameArr[0];
					localStorage.setItem(LOCALSTORAGE_LAST_FSM_, _activeFsm);
					migrateLegacyFsmKeysIfNeeded(_activeFsm);

					populateFsmSelect();

					//resolve CodeEditorSupervisor app id, then load file lists and aliases
					DesktopContent.XMLHttpRequest(
						"Request?RequestType=getAppId" +
						"&classNeedle=ots::CodeEditorSupervisor",
						"",
						function(ceReq)
						{
							_codeEditorAppId = DesktopContent.getXMLValue(ceReq, "id") | 0;
							Debug.log("_codeEditorAppId " + _codeEditorAppId);
							if (!_codeEditorAppId)
							{
								Debug.log("No CodeEditorSupervisor found in the active context. " +
									"File lists cannot be loaded.", Debug.HIGH_PRIORITY);
								return;
							}
							loadAllFileLists();
							loadAliasesForFsm(_activeFsm);
						},
						0, 0, true, false, true //targetGatewaySupervisor
					);
				},
				0, 0, true, true /*doNotShowLoadingOverlay*/, true /*targetGatewaySupervisor*/
			);
		}


		///////////////////////////////////////////////////////////////////////////
		// Per-FSM storage helpers
		///////////////////////////////////////////////////////////////////////////
		function fsmKey(fsmName, sectionId)
		{
			return LOCALSTORAGE_FSM_PREFIX_ + fsmName + "." + sectionId;
		}
		function getSavedSelection(fsmName, sectionId)
		{
			return localStorage.getItem(fsmKey(fsmName, sectionId));
		}
		function setSavedSelection(fsmName, sectionId, value)
		{
			if (value) localStorage.setItem(fsmKey(fsmName, sectionId), value);
			else       localStorage.removeItem(fsmKey(fsmName, sectionId));
		}

		// One-time migration: if the user has legacy keys "CaloConfig_<sectionId>"
		// (no FSM scope), copy them into the active FSM's slot the first time we
		// encounter that FSM. The legacy keys are left in place for safety.
		function migrateLegacyFsmKeysIfNeeded(fsmName)
		{
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
			{
				var sec = CONFIG_SECTIONS_[i];
				var legacy = localStorage.getItem(LOCALSTORAGE_PREFIX_ + sec.id);
				var current = getSavedSelection(fsmName, sec.id);
				if (legacy && !current)
					setSavedSelection(fsmName, sec.id, legacy);
			}
		}


		///////////////////////////////////////////////////////////////////////////
		// Per-section directory helpers (user-overridable)
		///////////////////////////////////////////////////////////////////////////
		function getDefaultSectionDir(sec)
		{
			return BOARD_CONFIG_BASE_PATH_ + "/" + sec.boardConfigDir;
		}
		function getSectionDir(sec)
		{
			var override = localStorage.getItem(LOCALSTORAGE_DIR_PREFIX_ + sec.id);
			return (override && override.length) ? override : getDefaultSectionDir(sec);
		}
		function setSectionDirOverride(sectionId, value)
		{
			if (value && value.length)
				localStorage.setItem(LOCALSTORAGE_DIR_PREFIX_ + sectionId, value);
			else
				localStorage.removeItem(LOCALSTORAGE_DIR_PREFIX_ + sectionId);
		}


		///////////////////////////////////////////////////////////////////////////
		// FSM bar (top of page): dropdown + status indicator + alias selector
		///////////////////////////////////////////////////////////////////////////
		function paintFsmBar()
		{
			var bar = document.getElementById("fsm-bar");
			if (!bar) return;
			bar.innerHTML =
				'<label class="fsm-label" for="fsm-select">Configure FSM:</label>' +
				'<select id="fsm-select" class="fsm-select" onchange="onFsmChange()">' +
					'<option value="">-- loading... --</option>' +
				'</select>' +
				'&nbsp;&nbsp;&nbsp;' +
				'<label class="fsm-label" for="alias-select">Configuration Alias:</label>' +
				'<select id="alias-select" class="fsm-select" onchange="onAliasChange()">' +
					'<option value="">-- loading... --</option>' +
				'</select>';
		}

		function populateFsmSelect()
		{
			var sel = document.getElementById("fsm-select");
			if (!sel) return;
			var str = "";
			for (var i = 0; i < _fsmNameArr.length; ++i)
			{
				var n = _fsmNameArr[i];
				str += '<option value="' + escapeHtml(n) + '"' +
					(n === _activeFsm ? ' selected' : '') + '>' +
					escapeHtml(n) + '</option>';
			}
			sel.innerHTML = str;
		}

		function loadAliasesForFsm(fsmName)
		{
			if (!fsmName) return;
			
			// Use ConfigurationAPI to fetch group aliases
			// Aliases are organized by group type (Context, Backbone, Iterate, Configuration)
			ConfigurationAPI.getAliasesAndGroups(
				function(aliasesAndGroupsObj)
				{
					if (!aliasesAndGroupsObj || !aliasesAndGroupsObj.aliases)
					{
						Debug.log("Could not load aliases", Debug.WARN_PRIORITY);
						_aliasesPerFsm[fsmName] = [];
						populateAliasSelect();
						return;
					}

					// Extract Configuration group aliases
					var configAliases = aliasesAndGroupsObj.aliases["Configuration"] || [];
					var aliases = [];
					
					for (var i = 0; i < configAliases.length; ++i)
					{
						if (configAliases[i].alias)
							aliases.push(configAliases[i].alias);
					}
					
					_aliasesPerFsm[fsmName] = aliases;
					
					// Restore last-used alias for this FSM
					var savedAlias = localStorage.getItem(LOCALSTORAGE_ALIAS_PREFIX_ + fsmName);
					if (savedAlias && aliases.indexOf(savedAlias) >= 0)
						_activeAlias = savedAlias;
					else
						_activeAlias = "";
					
					populateAliasSelect();
					
					if (aliases.length > 0)
						Debug.log("Loaded " + aliases.length + " aliases for FSM '" + fsmName + "'");
				},
				false, //optionForNoAliases - we want aliases
				false  //optionForNoGroups - we want groups too
			);
		}

		function populateAliasSelect()
		{
			var sel = document.getElementById("alias-select");
			if (!sel) return;

			var aliases = _aliasesPerFsm[_activeFsm] || [];
			if (!aliases.length)
			{
				sel.innerHTML = '<option value="">-- no aliases --</option>';
				return;
			}

			var str = '<option value="">-- select alias --</option>';
			for (var i = 0; i < aliases.length; ++i)
			{
				var alias = aliases[i];
				str += '<option value="' + escapeHtml(alias) + '"' +
					(alias === _activeAlias ? ' selected' : '') + '>' +
					escapeHtml(alias) + '</option>';
			}
			sel.innerHTML = str;
		}

		function onAliasChange()
		{
			var sel = document.getElementById("alias-select");
			if (!sel) return;
			var newAlias = sel.value;

			if (newAlias)
			{
				_activeAlias = newAlias;
				localStorage.setItem(LOCALSTORAGE_ALIAS_PREFIX_ + _activeFsm, _activeAlias);
				Debug.log("Activated alias: " + _activeAlias + " for FSM: " + _activeFsm);
				// Trigger activation via ConfigurationAPI
				activateAlias(_activeFsm, _activeAlias);
			}
			else
			{
				_activeAlias = "";
				localStorage.removeItem(LOCALSTORAGE_ALIAS_PREFIX_ + _activeFsm);
			}
		}

		// Activate a configuration alias by name
		function activateAlias(fsmName, aliasName)
		{
			if (!fsmName || !aliasName) return;

			// Use ConfigurationAPI to find the alias details and activate it
			ConfigurationAPI.getAliasesAndGroups(
				function(aliasesAndGroupsObj)
				{
					if (!aliasesAndGroupsObj || !aliasesAndGroupsObj.aliases)
						return;

					// Find the alias object for Configuration group type
					var configAliases = aliasesAndGroupsObj.aliases["Configuration"] || [];
					var aliasObj = null;
					
					for (var i = 0; i < configAliases.length; ++i)
					{
						if (configAliases[i].alias === aliasName)
						{
							aliasObj = configAliases[i];
							break;
						}
					}
					
					if (!aliasObj)
					{
						Debug.log("Alias '" + aliasName + "' not found in Configuration group", 
							Debug.WARN_PRIORITY);
						return;
					}

					// Activate the configuration group with this alias
					// The alias corresponds to a specific group (groupName/groupKey)
					ConfigurationAPI.activateGroup(aliasObj.name, aliasObj.key, 
						false, /*ignoreWarnings*/
						function(err)
						{
							if (err)
							{
								Debug.log("Failed to activate alias '" + aliasName + "': " + err,
									Debug.WARN_PRIORITY);
								return;
							}
							Debug.log("Successfully activated Configuration alias: " + aliasName);
							
							// Refresh active lines to show updated state
							refreshAllActiveLines();
						}
					);
				},
				false, //optionForNoAliases
				false  //optionForNoGroups
			);
		}

		function onFsmChange()
		{
			var sel = document.getElementById("fsm-select");
			if (!sel) return;
			var newFsm = sel.value;
			if (!newFsm || newFsm === _activeFsm) return;

			Debug.log("Switching active FSM to: " + newFsm);
			_activeFsm = newFsm;
			localStorage.setItem(LOCALSTORAGE_LAST_FSM_, _activeFsm);
			migrateLegacyFsmKeysIfNeeded(_activeFsm); //in case this FSM was never seen before

			//Load the alias list for this FSM and restore last-used alias
			loadAliasesForFsm(_activeFsm);

			//modified-tables map is per-session edits, not per-FSM; clear on switch
			modifiedTablesMap_ = {};

			//repaint and refresh selections for the new FSM using cached file lists if available
			paintSections();
			refreshAllActiveLines(); //"Active" elements were re-created blank
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
			{
				var sec = CONFIG_SECTIONS_[i];
				if (_fileListCache_[sec.id])
					renderSectionFromCache(sec);
				else
					loadFileListForSection(sec);
			}
		}


		///////////////////////////////////////////////////////////////////////////
		function paintSections()
		{
			var el = document.getElementById("display");
			var str = "";
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
			{
				var sec = CONFIG_SECTIONS_[i];
				var curDir = getSectionDir(sec);
				var isOverridden = (curDir !== getDefaultSectionDir(sec));
				str += '<div class="config-card" id="section-' + sec.id + '">';

				// Title row: title (left) + (dir hint | dir input) + (pencil | save/reset/cancel)
				// View and edit share the same row; clicking the pencil swaps the
				// <span> for an <input> and the pencil for save/reset/cancel buttons.
				str += '<div class="card-header">';
				str +=   '<div class="card-title" title="' +
					escapeHtml(sec.description) + '">' + sec.title + '</div>';
				str +=   '<div class="card-header-right" id="dir-area-' + sec.id + '">';

				// VIEW mode: static dir text + pencil
				str +=     '<span class="dir-hint' +
					(isOverridden ? ' is-overridden' : '') +
					'" id="dir-hint-' + sec.id + '"' +
					' title="' + escapeHtml(curDir) + '">' +
					escapeHtml(curDir) +
					'</span>';
				str +=     '<button class="btn-edit-dir' +
					(isOverridden ? ' is-overridden' : '') +
					'" id="btn-edit-dir-' + sec.id +
					'" onclick="onEditDir(\'' + sec.id + '\')"' +
					' title="Edit directory for this section">&#9998;</button>';

				// EDIT mode (hidden by default): input + inline action buttons
				str +=     '<input type="text" class="dir-input" id="dir-input-' + sec.id +
					'" value="' + escapeHtml(curDir) + '"' +
					' onkeydown="onDirEditorKey(event, \'' + sec.id + '\')"' +
					' spellcheck="false" autocomplete="off" style="display:none;">';
				str +=     '<button class="btn-dir-save" id="btn-dir-save-' + sec.id +
					'" onclick="onSaveDir(\'' + sec.id + '\')"' +
					' title="Apply directory" style="display:none;">&#10003;</button>';
				str +=     '<button class="btn-dir-reset" id="btn-dir-reset-' + sec.id +
					'" onclick="onResetDir(\'' + sec.id + '\')"' +
					' title="Reset to default directory" style="display:none;">&#8635;</button>';
				str +=     '<button class="btn-dir-cancel" id="btn-dir-cancel-' + sec.id +
					'" onclick="onCancelDir(\'' + sec.id + '\')"' +
					' title="Cancel" style="display:none;">&#10005;</button>';

				str +=   '</div>';
				str += '</div>';

				// "Active" line: shows the table's current persistent version
				// and -- if the last upload was done from this GUI -- the
				// source CSV filename embedded in the tableComment.
				str += '<div class="active-line" id="active-' + sec.id + '"' +
					' title="Currently active table version (and file name if configured via this GUI)">' +
					'Active: <span class="active-version">(loading)</span>' +
					'</div>';

// Main controls: file select + Upload button
			str += '<div class="card-controls">';
			str +=   '<select id="select-' + sec.id + '"' +
				' onchange="onSelectionChanged(\'' + sec.id + '\')">' +
				'<option value="">-- loading... --</option></select>';
			str +=   '<button class="btn-configure" id="btn-' + sec.id +
				'" onclick="onConfigure(\'' + sec.id +
				'\')" disabled>Upload</button>';
				str += '</div>';

				str += '<div class="status-msg" id="status-' + sec.id + '"></div>';
				str += '</div>';
			}
			el.innerHTML = str;
		}


		///////////////////////////////////////////////////////////////////////////
		// Per-section directory editor (pencil) handlers
		///////////////////////////////////////////////////////////////////////////
		// Toggle the header between "view" (dir text + pencil) and "edit"
		// (text input + save/reset/cancel) modes. Both modes share the same
		// row inside .card-header-right, so the layout never shifts.
		function setDirEditMode(sectionId, editing)
		{
			var hint   = document.getElementById("dir-hint-"       + sectionId);
			var pencil = document.getElementById("btn-edit-dir-"   + sectionId);
			var input  = document.getElementById("dir-input-"      + sectionId);
			var save   = document.getElementById("btn-dir-save-"   + sectionId);
			var reset  = document.getElementById("btn-dir-reset-"  + sectionId);
			var cancel = document.getElementById("btn-dir-cancel-" + sectionId);
			var area   = document.getElementById("dir-area-"       + sectionId);
			if (!input || !hint) return;

			var viewDisp = editing ? "none" : "";
			var editDisp = editing ? ""     : "none";

			hint.style.display   = viewDisp;
			pencil.style.display = viewDisp;
			input.style.display  = editDisp;
			save.style.display   = editDisp;
			reset.style.display  = editDisp;
			cancel.style.display = editDisp;

			if (area) area.classList.toggle("is-editing", !!editing);
		}

		function onEditDir(sectionId)
		{
			var input = document.getElementById("dir-input-" + sectionId);
			var sec   = getSectionById(sectionId);
			if (!input || !sec) return;

			//pre-fill with the current (possibly overridden) directory
			input.value = getSectionDir(sec);
			setDirEditMode(sectionId, true);
			input.focus();
			input.select();
		}

		function onCancelDir(sectionId)
		{
			setDirEditMode(sectionId, false);
		}

		function onSaveDir(sectionId)
		{
			var sec   = getSectionById(sectionId);  if (!sec) return;
			var input = document.getElementById("dir-input-" + sectionId);
			if (!input) return;
			var newDir = (input.value || "").trim();
			var defDir = getDefaultSectionDir(sec);

			//empty input == reset to default
			if (!newDir || newDir === defDir)
				setSectionDirOverride(sectionId, "");
			else
				setSectionDirOverride(sectionId, newDir);

			//invalidate cache + reload listing for this section under the new dir
			_fileListCache_[sectionId] = undefined;
			onCancelDir(sectionId);  //close editor
			repaintSectionHeader(sec);
			loadFileListForSection(sec);
		}

		function onResetDir(sectionId)
		{
			var sec = getSectionById(sectionId);  if (!sec) return;
			setSectionDirOverride(sectionId, "");
			_fileListCache_[sectionId] = undefined;
			onCancelDir(sectionId);
			repaintSectionHeader(sec);
			loadFileListForSection(sec);
		}

		function onDirEditorKey(evt, sectionId)
		{
			if (evt.key === "Enter")  { evt.preventDefault(); onSaveDir(sectionId);   }
			if (evt.key === "Escape") { evt.preventDefault(); onCancelDir(sectionId); }
		}

		// Update just the dir hint + pencil-button styling for one section
		// (without re-rendering the whole card and losing the <select>).
		function repaintSectionHeader(sec)
		{
			var curDir       = getSectionDir(sec);
			var isOverridden = (curDir !== getDefaultSectionDir(sec));

			var hint = document.getElementById("dir-hint-" + sec.id);
			if (hint)
			{
				hint.className   = "dir-hint" + (isOverridden ? " is-overridden" : "");
				hint.textContent = curDir;
				hint.title       = curDir;
			}
			var btn = document.getElementById("btn-edit-dir-" + sec.id);
			if (btn)
				btn.className = "btn-edit-dir" + (isOverridden ? " is-overridden" : "");
		}


		///////////////////////////////////////////////////////////////////////////
		function loadAllFileLists()
		{
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
				loadFileListForSection(CONFIG_SECTIONS_[i]);
		}

		function loadFileListForSection(sec)
		{
			var dirPath = getSectionDir(sec);

			//show a transient "loading" indicator for this section
			var statusEl = document.getElementById("status-" + sec.id);
			var selectEl = document.getElementById("select-" + sec.id);
			if (selectEl) selectEl.innerHTML = '<option value="">-- loading... --</option>';
			if (statusEl)
			{
				statusEl.className = "status-msg info";
				statusEl.innerHTML = '<span class="dot dot-info"></span>Loading ' +
					escapeHtml(dirPath) + ' ...';
			}

			if (!_codeEditorAppId)
			{
				Debug.log("CodeEditorSupervisor app id not resolved yet; cannot list " +
					dirPath, Debug.WARN_PRIORITY);
				return;
			}

			//DesktopContent.XMLHttpRequest builds the request URL from
			//DesktopContent._localUrnLid, so route this call to the CodeEditorSupervisor
			//by swapping _localUrnLid temporarily. The URL is built synchronously
			//inside XMLHttpRequest (via req.open()), so we can restore immediately.
			var savedUrn = DesktopContent._localUrnLid;
			DesktopContent._localUrnLid = _codeEditorAppId;

			DesktopContent.XMLHttpRequest(
				"Request?RequestType=readOnlycodeEditor" +
				"&option=getDirectoryContent" +
				"&path=" + encodeURIComponent(dirPath),
				"",
				function(req, reqParam, errStr)
				{
					if (errStr || !req)
					{
						_fileListCache_[sec.id] = null;
						var selectEl = document.getElementById("select-" + sec.id);
						var statusEl = document.getElementById("status-" + sec.id);
						selectEl.innerHTML = '<option value="">-- directory not found --</option>';
						statusEl.className = "status-msg error";
						statusEl.innerHTML = '<span class="dot dot-error"></span>Cannot read ' +
							escapeHtml(dirPath);
						return;
					}

					var files = req.responseXML.getElementsByTagName("file");
					var dirs  = req.responseXML.getElementsByTagName("directory");
					var items = [];
					for (var j = 0; j < files.length; ++j)
						items.push(files[j].getAttribute("value"));
					for (var j = 0; j < dirs.length; ++j)
						items.push(dirs[j].getAttribute("value") + "/");

					_fileListCache_[sec.id] = items;
					renderSectionFromCache(sec);
				},
				0, 0, true
			);

			//restore immediately; XHR is async, but the URL is built synchronously above
			DesktopContent._localUrnLid = savedUrn;
		}


		///////////////////////////////////////////////////////////////////////////
		// Render a section's <select> from the cached directory listing, picking
		// the saved selection for the currently-active FSM and updating the
		// validation indicator. Called both after the directory fetch completes
		// and when the user switches between FSMs (no fetch needed).
		///////////////////////////////////////////////////////////////////////////
		function renderSectionFromCache(sec)
		{
			var selectEl = document.getElementById("select-" + sec.id);
			var statusEl = document.getElementById("status-" + sec.id);
			var btnEl    = document.getElementById("btn-" + sec.id);
			var dirPath  = getSectionDir(sec);
			var items    = _fileListCache_[sec.id];

			if (!items)
			{
				selectEl.innerHTML = '<option value="">-- not loaded --</option>';
				statusEl.className = "status-msg warn";
				statusEl.innerHTML = '<span class="dot dot-warn"></span>Not loaded.';
				btnEl.disabled = true;
				return;
			}
			if (items.length === 0)
			{
				selectEl.innerHTML = '<option value="">-- empty --</option>';
				statusEl.className = "status-msg warn";
				statusEl.innerHTML = '<span class="dot dot-warn"></span>No files in ' +
					escapeHtml(dirPath);
				btnEl.disabled = true;
				return;
			}

			var str = '<option value="">-- select --</option>';
			for (var j = 0; j < items.length; ++j)
				str += '<option value="' + escapeHtml(items[j]) +
					'">' + escapeHtml(items[j]) + '</option>';
			selectEl.innerHTML = str;

			var saved = getSavedSelection(_activeFsm, sec.id);
			if (saved)
			{
				selectEl.value = saved;
				if (selectEl.value !== saved)
				{
					//The previously-saved selection no longer exists in this
					//directory; flag it so the shifter knows their saved
					//choice is gone.
					statusEl.className = "status-msg error";
					statusEl.innerHTML = '<span class="dot dot-error"></span><b>' +
						escapeHtml(saved) + '</b> no longer available.';
					btnEl.disabled = !selectEl.value;
					return;
				}
				//Saved selection is still valid: pre-select it in the dropdown
				//but stay quiet in the status line. The "Active" pill at the
				//top of the card already shows what is currently configured;
				//repeating the file name here is just noise on page load.
			}

			statusEl.className = "status-msg";
			statusEl.innerHTML = '<span class="dot dot-idle"></span>' +
				items.length + " file(s) available.";

			btnEl.disabled = !selectEl.value;
		}


		///////////////////////////////////////////////////////////////////////////
		function onSelectionChanged(sectionId)
		{
			var selectEl = document.getElementById("select-" + sectionId);
			var statusEl = document.getElementById("status-" + sectionId);
			var val = selectEl.value;

			setSavedSelection(_activeFsm, sectionId, val);

			if (val)
			{
				statusEl.className = "status-msg info";
				statusEl.innerHTML = '<span class="dot dot-info"></span>Selected: <b>' +
					escapeHtml(val) + '</b>';
			}
			else
			{
				statusEl.className = "status-msg";
				statusEl.innerHTML = '<span class="dot dot-idle"></span>No file selected.';
			}

			document.getElementById("btn-" + sectionId).disabled = !val;
		}


		///////////////////////////////////////////////////////////////////////////
		// onConfigure orchestrates the full "push selected CSV file into the
		// section's Mongo table" pipeline:
		//   1. Read the CSV file via the CodeEditor read-only API
		//   2. Parse rows (handles [[...]] nested arrays and quoted strings)
		//   3. Look up the table schema (auto-discover writable column count)
		//   4. Validate every row (column count, BoardID exists in table)
		//   5. POST the entire table contents in one shot via the
		//      saveSpecificTable RequestType (which delegates to
		//      TableView::fillFromEncodedCSV server-side). Single round-trip.
		// Any error (missing column, missing BoardID, row-width mismatch, server
		// rejection) is reported in the section's status line; no partial writes.
		///////////////////////////////////////////////////////////////////////////
		function onConfigure(sectionId)
		{
			var sec = getSectionById(sectionId);  if (!sec) return;
			var fileName = document.getElementById("select-" + sec.id).value;
			if (!fileName) return;

			var filePath = getSectionDir(sec).replace(/\/+$/, "") + "/" + fileName;

			var btnEl    = document.getElementById("btn-" + sec.id);
			var statusEl = document.getElementById("status-" + sec.id);

			btnEl.disabled = true;
			statusEl.className = "status-msg info";
			statusEl.innerHTML = '<span class="dot dot-info"></span>Reading ' +
				escapeHtml(fileName) + ' ...';

			// done(ok, msgOrInfo)
			//   on success: msgOrInfo is an object { savedVersion, foundEquivalent, rowCount, fileName }
			//   on failure: msgOrInfo is an error string
			function done(ok, msgOrInfo)
			{
				btnEl.disabled = false;
				statusEl.className = "status-msg " + (ok ? "success" : "error");
				if (ok)
				{
					var info  = msgOrInfo || {};
					var verStr = escapeHtml(String(info.savedVersion));
					var label;
					if (info.unchanged)
						label = 'Already configured (table version ' + verStr +
							' unchanged)';
					else if (info.foundEquivalent)
						label = 'Uploaded <b>' + escapeHtml(info.fileName || "?") +
							'</b> as equivalent version ' + verStr + ' (reused)';
					else
						label = 'Uploaded <b>' + escapeHtml(info.fileName || "?") +
							'</b> as table version ' + verStr;

					statusEl.innerHTML = '<span class="dot dot-ok"></span>' + label +
						' &middot; ' + getDateString(new Date());

					//refresh the "Active" line in this section card so it
					//immediately reflects the new version+file.
					updateSectionActiveLine(sec, {
						version:  info.savedVersion,
						fileName: info.fileName
					});
				}
				else
				{
					statusEl.innerHTML = '<span class="dot dot-error"></span>Error: ' +
						escapeHtml(msgOrInfo);
					Debug.log("onConfigure error: " + msgOrInfo, Debug.HIGH_PRIORITY);
				}
			}

			readCodeEditorFile(filePath, function(text, errStr)
			{
				if (errStr || text == null)
				{ done(false, "Cannot read CSV file: " + (errStr || "no data")); return; }

				var rows;
				try { rows = parseCaloCsv(text); }
				catch (e) { done(false, "CSV parse error: " + e.message); return; }

				if (!rows.length)
				{ done(false, "CSV file has no usable data rows."); return; }

				statusEl.innerHTML = '<span class="dot dot-info"></span>Uploading ' +
					rows.length + ' row(s) to ' + escapeHtml(sec.mongoTable) + '...';

				pushCsvToMongoTable(sec, rows, fileName, done);
			});
		}


		///////////////////////////////////////////////////////////////////////////
		// Verify a configuration table exists and return its records.
		//
		// We bypass ConfigurationAPI.getSubsetRecords because that helper
		// swallows the server-side "Error" XML element and always calls back
		// with an empty record array, which is indistinguishable from a real
		// (but empty) table. We need to tell the two apart so that we can
		// REFUSE to push to a non-existent table (no auto-create allowed).
		//
		// Calls cb({ exists, records, errorMsg }):
		//   exists=true,  records=[...]            -> table exists; may be empty
		//   exists=false, errorMsg="..."           -> table missing / unreachable
		///////////////////////////////////////////////////////////////////////////
		function checkTableExistsAndGetRecords(sec, cb)
		{
			var modifiedTables = modifiedTablesMap_[sec.id];
			var modifiedTablesListStr = "";
			for (var i = 0; modifiedTables && i < modifiedTables.length; ++i)
			{
				if (i) modifiedTablesListStr += ",";
				modifiedTablesListStr += modifiedTables[i].tableName + "," +
					modifiedTables[i].tableVersion;
			}

			DesktopContent.XMLHttpRequest(
				"Request?RequestType=getTreeView" +
				"&tableGroup=" +
				"&tableGroupKey=-1" +
				"&hideStatusFalse=0" +
				"&depth=1",
				"startPath=/" + sec.mongoTable +
				"&filterList=" +
				"&modifiedTables=" + modifiedTablesListStr,
				function(req, reqParam, errStr)
				{
					if (errStr)
					{
						cb({ exists: false, errorMsg: errStr });
						return;
					}
					var err = DesktopContent.getXMLValue(req, "Error");
					if (err)
					{
						//classic "table does not exist" responses include
						//"Invalid subset path" or "Failed to find table"; treat
						//any Error from getTreeView as "table not available".
						cb({ exists: false, errorMsg: err });
						return;
					}

					var records = [];
					var tree = DesktopContent.getXMLNode(req, "tree");
					if (tree && tree.children)
					{
						for (var i = 0; i < tree.children.length; ++i)
							records.push(tree.children[i].getAttribute("value"));
					}
					cb({ exists: true, records: records });
				},
				0, //reqParam
				0, //progressHandler
				true //callHandlerOnErr
			);
		}

		///////////////////////////////////////////////////////////////////////////
		// Read a file via the CodeEditor read-only API.
		//
		// IMPORTANT: the CodeEditor RequestType "getFileContent" wants the path
		// and the extension split into two separate parameters (path=..., ext=...).
		// The server reconstructs <path>.<ext> internally and validates the
		// extension against an allow-list (see CodeEditor.cc:173). Passing the
		// full "foo/bar.csv" in path with ext="" yields:
		//   "Invalid extension '' found!"
		//
		// So we split on the LAST dot here. Files without an extension cannot be
		// read by this endpoint (and shouldn't be in our directories anyway).
		//
		// cb(text, errStr) -- text=null on error.
		///////////////////////////////////////////////////////////////////////////
		function readCodeEditorFile(filePath, cb)
		{
			if (!_codeEditorAppId)
			{ cb(null, "CodeEditorSupervisor app id not resolved."); return; }

			var dotIdx = filePath.lastIndexOf(".");
			var slashIdx = filePath.lastIndexOf("/");
			//ensure the dot is in the filename, not in a parent directory
			if (dotIdx < 0 || dotIdx < slashIdx)
			{ cb(null, "File '" + filePath + "' has no extension; CodeEditor cannot read it."); return; }

			var pathNoExt = filePath.substring(0, dotIdx);
			var ext       = filePath.substring(dotIdx + 1);
			if (!ext)
			{ cb(null, "File '" + filePath + "' has an empty extension."); return; }

			//see loadFileListForSection() for why we swap _localUrnLid here
			var savedUrn = DesktopContent._localUrnLid;
			DesktopContent._localUrnLid = _codeEditorAppId;

			DesktopContent.XMLHttpRequest(
				"Request?RequestType=readOnlycodeEditor" +
				"&option=getFileContent" +
				"&path=" + encodeURIComponent(pathNoExt) +
				"&ext="  + encodeURIComponent(ext),
				"",
				function(req, reqParam, errStr)
				{
					if (errStr || !req || !req.responseXML)
					{ cb(null, errStr || "Empty response"); return; }
					var err = DesktopContent.getXMLValue(req, "Error");
					if (err) { cb(null, err); return; }

					//CodeEditor returns the file body in the <text> XML element
					//(see CodeEditor.editor.handleFileContent). Older endpoints
					//may instead return <content> or fall back to responseText.
					var content =
						DesktopContent.getXMLValue(req, "text") ||
						DesktopContent.getXMLValue(req, "content");
					if (content == null) content = req.responseText || "";
					cb(content, null);
				},
				0, 0, true
			);

			DesktopContent._localUrnLid = savedUrn;
		}


		///////////////////////////////////////////////////////////////////////////
		// Parse a calorimeter-style CSV line into top-level cells, treating
		// "[[...]]" nested arrays and "..." quoted strings as single cells
		// (so commas inside them are NOT splitters). Returns an array of cells
		// per line; each cell is the raw substring (with its surrounding
		// brackets/quotes preserved -- ots stores BitMaps as the "[[v0,v1,...]]"
		// string verbatim).
		//
		// Throws if a line has unbalanced quotes/brackets.
		///////////////////////////////////////////////////////////////////////////
		function splitCaloCsvLine(line)
		{
			var cells   = [];
			var buf     = "";
			var depth   = 0;     //nesting count for [ and (
			var inQuote = false; //inside a "..." string
			for (var i = 0; i < line.length; ++i)
			{
				var c = line.charAt(i);
				if (inQuote)
				{
					if (c === '"')
					{
						// "" inside a quoted field is an escaped literal quote
						if (i + 1 < line.length && line.charAt(i + 1) === '"')
						{
							buf += '"';
							++i; //skip the second quote
						}
						else
						{
							inQuote = false; //closing quote -- do NOT append it
						}
					}
					else
					{
						buf += c;
					}
					continue;
				}
				if (c === '"')      { inQuote = true; continue; } //opening quote -- do NOT append it
				if (c === '[' || c === '(') { depth++; buf += c; continue; }
				if (c === ']' || c === ')')
				{
					if (depth === 0)
						throw new Error("Unbalanced bracket at column " + (i + 1));
					depth--;
					buf += c;
					continue;
				}
				if (c === ',' && depth === 0)
				{
					cells.push(buf.trim());
					buf = "";
					continue;
				}
				buf += c;
			}
			if (inQuote) throw new Error("Unterminated quoted string");
			if (depth !== 0) throw new Error("Unbalanced brackets");
			cells.push(buf.trim());
			return cells;
		}

		// Returns array of { boardId: <string>, cells: [boardId, dataCells...] }
		function parseCaloCsv(text)
		{
			var lines = text.split(/\r?\n/);
			var out = [];
			for (var i = 0; i < lines.length; ++i)
			{
				var raw = lines[i];
				if (!raw || !raw.trim()) continue;       //skip blank lines
				if (raw.trim().charAt(0) === '#') continue; //skip comment lines

				var cells;
				try { cells = splitCaloCsvLine(raw); }
				catch (e) { throw new Error("Line " + (i + 1) + ": " + e.message); }

				if (cells.length < 2)
					throw new Error("Line " + (i + 1) + ": expected at least 2 cells, got " + cells.length);

				out.push({ boardId: cells[0], cells: cells, lineNo: i + 1 });
			}
			return out;
		}


		///////////////////////////////////////////////////////////////////////////
		// Discover the schema for a table -- which columns exist and what their
		// types are -- via ConfigurationAPI.getFieldsOfRecords.
		// cb(fields, errStr): fields = array of field objects from the API.
		///////////////////////////////////////////////////////////////////////////
		function getTableSchema(sec, anyRecordUID, cb)
		{
			//NOTE: depth must be >= 1; the server rejects depth=0 with
			//"Depth of search must be greater than 0." (ConfigurationGUISupervisor.cc:3193).
			//We only need the immediate child columns of the record, so depth=1.
			ConfigurationAPI.getFieldsOfRecords(
				sec.mongoTable, [anyRecordUID],
				"" /*fieldList = all*/, 1 /*depth*/,
				function(fields)
				{
					if (!fields || !fields.length)
					{ cb(null, "Could not read schema (no fields returned)."); return; }
					cb(fields, null);
				},
				modifiedTablesMap_[sec.id]
			);
		}

		// Column types that the GUI never writes from the CSV (auto-managed by ots).
		//
		// NOTE about UID: in ots, the record's UID column is NOT returned by
		// getFieldsOfRecords -- that endpoint returns the non-UID children of
		// each record. The UID column's value IS the record key itself (i.e.
		// what getSubsetRecords gives us). So we never need a "UID field"
		// descriptor here. The CSV's first cell is matched directly against
		// the record UID.
		var AUTO_MANAGED_COLUMN_TYPES_ = {
			"Comment": true, "Author": true, "Timestamp": true
		};

		// Pick the ordered "data" fields from a schema array (everything that
		// is not auto-managed and not the UID column).
		function classifyFields(fields)
		{
			var dataFields = [];
			for (var i = 0; i < fields.length; ++i)
			{
				var f = fields[i];
				var t = f.fieldColumnType;
				//defensive: skip a UID field if for any reason the server did
				//include one here.
				if (t === "UID") continue;
				if (AUTO_MANAGED_COLUMN_TYPES_[t]) continue;
				dataFields.push(f);
			}
			return { dataFields: dataFields };
		}

		// Normalize a record-UID-like string (the CSV's BoardID cell, or a
		// stored record key) to a canonical form so that "0" matches "0", and
		// non-numeric strings (e.g. "Default") are compared trimmed.
		function normalizeRecordKey(s)
		{
			if (s == null) return "";
			var t = String(s).trim();
			if (t === "") return "";
			var n = Number(t);
			if (!isNaN(n) && isFinite(n) && /^-?\d+(\.\d+)?$/.test(t))
				return String(n | 0); //force integer interpretation
			return t;
		}


		///////////////////////////////////////////////////////////////////////////
		// Main writer. Builds an encoded-CSV "data=" string and POSTs it to the
		// server's saveSpecificTable RequestType, which delegates to
		// TableView::fillFromEncodedCSV() -- the same code path used by the
		// Configure GUI's "Upload Data (CSV)" feature. This is a SINGLE
		// round-trip that replaces the whole table contents and creates a new
		// persistent version, far faster than per-cell edits.
		//
		// Wire format expected by the server (TableView.cc:3247-3248):
		//   - ',' separates cells within a row (every cell including the last
		//     is followed by a comma)
		//   - ';' separates rows (so each row is "c0,c1,...,cN,;")
		//   - all cells are URI-encoded (%##); the server decodes via
		//     setURIEncodedValue
		//   - the last 2 columns (Author + Timestamp) are auto-skipped server-
		//     side, so the CSV need only carry data columns + UID
		//
		// We send rows in the same column order as the table's mockup:
		//   <UID>, <dataField[0]>, <dataField[1]>, ..., <dataField[N-1]>, ;
		// CommentDescription and other "user" columns we don't write will
		// retain their pre-existing values from the source version we cloned.
		///////////////////////////////////////////////////////////////////////////
		// Marker we embed inside the table's tableComment so that we can later
		// recover the source CSV filename for the "Active" display on startup.
		// Format: "[CaloFile:<filename>]" appended at the end of the comment.
		// Regex must match exactly that, with no nested ']' allowed in the file
		// name (which is fine -- our filenames are plain).
		var CALO_FILE_COMMENT_MARKER_RE_ = /\[CaloFile:([^\]]+)\]/;
		function makeUploadComment(sec, fileName, rowCount)
		{
			return "CaloConfiguration upload: FSM=" + (_activeFsm || "?") +
				", " + sec.title + ", " + rowCount + " row(s) " +
				"[CaloFile:" + (fileName || "") + "]";
		}
		function extractFileNameFromComment(comment)
		{
			if (!comment) return null;
			var m = CALO_FILE_COMMENT_MARKER_RE_.exec(comment);
			return m ? m[1] : null;
		}

		function pushCsvToMongoTable(sec, csvRows, fileName, done)
		{
			checkTableExistsAndGetRecords(sec, function(res)
			{
				if (!res.exists)
				{
					done(false,
						"Table " + sec.mongoTable + " does not exist or cannot be read" +
						(res.errorMsg ? (" (" + res.errorMsg + ")") : "") +
						". Please create the table first.");
					return;
				}
				if (!res.records || !res.records.length)
				{
					done(false,
						"Table " + sec.mongoTable + " exists but has no records " +
						"to update. Please add a record per BoardID first.");
					return;
				}

				var records = res.records;

				//Build a set of existing UIDs so we can reject CSV rows that
				//reference an unknown BoardID (no auto-add policy).
				var existingUidSet = {};
				for (var i = 0; i < records.length; ++i)
					existingUidSet[normalizeRecordKey(records[i])] = true;

				getTableSchema(sec, records[0], function(fields, schemaErr)
				{
					if (schemaErr) { done(false, schemaErr); return; }

					var cls = classifyFields(fields);
					if (!cls.dataFields.length)
					{ done(false, "Table has no writable data columns in schema."); return; }

					var expectedCells = 1 + cls.dataFields.length; //UID + data cols
					var encodedDataParts = []; //pieces of the "data=" POST body

					//validate + encode every row up-front so we don't send a
					//half-built payload on error.
					for (var i = 0; i < csvRows.length; ++i)
					{
						var row = csvRows[i];
						if (row.cells.length < expectedCells)
						{
							done(false, "CSV line " + row.lineNo +
								": expected " + expectedCells +
								" cells (BoardID + " + cls.dataFields.length +
								" data columns), got " + row.cells.length + ".");
							return;
						}
						// var key = normalizeRecordKey(row.boardId);
						// if (!(key in existingUidSet))
						// {
						// 	done(false, "CSV line " + row.lineNo +
						// 		": BoardID '" + row.boardId +
						// 		"' (normalized to '" + key + "') is not present in " + sec.mongoTable +
						// 		". Refusing to add new records. Existing BoardIDs: " +
						// 		Object.keys(existingUidSet).join(", "));
						// 	return;
						// }

						//Build "<UID>,<data0>,<data1>,...,<dataN>,;"  (note the
						//required trailing comma before the semicolon).
						var rowParts = [];
						for (var c = 0; c < expectedCells; ++c)
							rowParts.push(encodeURIComponent(row.cells[c]));
						encodedDataParts.push(rowParts.join(",") + ",;");
					}

					var dataStr = encodedDataParts.join("");

					//Resolve the current persistent version of the table. The
					//schema fetch we just did populates ConfigurationAPI._activeTables
					//(see getFieldsOfRecords). The mongoTable path has a leading
					//slash; the active-tables map is keyed by bare table name.
					var bareTableName = sec.mongoTable.replace(/^\/+/, "");
					var currentVersion =
						(ConfigurationAPI._activeTables &&
						 ConfigurationAPI._activeTables[bareTableName]) | 0;

					var comment = makeUploadComment(sec, fileName, csvRows.length);

					var reqStr =
						"Request?RequestType=saveSpecificTable" +
						"&dataOffset=0" +
						"&chunkSize=" + csvRows.length +
						"&tableName=" + encodeURIComponent(bareTableName) +
						"&version=" + currentVersion +
						"&lookForEquivalent=1" +
						"&temporary=1" +
						"&tableComment=" + encodeURIComponent(comment);

					DesktopContent.XMLHttpRequest(reqStr, "data=" + dataStr,
						function(req, reqParam, errStr)
						{
							if (errStr) { done(false, errStr); return; }
							var err = DesktopContent.getXMLValue(req, "Error");
							if (err)
							{
								//Special-case the server's "No rows were modified!"
								//rejection (ConfigurationSupervisorBase.cc:198,
								//re-thrown from TableView::fillFromEncodedCSV when
								//every cell already matches the source version).
								//
								//That's not an error: the table is already
								//configured with this exact content. Resolve it
								//to a friendly success by re-reading the active
								//table info (which carries both the unchanged
								//version and the previously-recorded filename
								//from the table comment).
								if (/No rows were modified/i.test(err))
								{
									modifiedTablesMap_[sec.id] = undefined;
									fetchActiveTableInfo(sec, function(info /*, infoErr*/)
									{
										done(true, {
											savedVersion:    info ? info.version : "(unchanged)",
											foundEquivalent: false,
											unchanged:       true,
											rowCount:        csvRows.length,
											fileName:        fileName
										});
									});
									return;
								}
								done(false, err);
								return;
							}

							var savedVersion = DesktopContent.getXMLValue(req, "savedVersion");
							var foundEquivalent =
								DesktopContent.getXMLValue(req, "foundEquivalentVersion") | 0;

							if (savedVersion == null || savedVersion === "")
							{ done(false, "Server did not return a savedVersion."); return; }

							//clear any in-flight modified tables for this section
							modifiedTablesMap_[sec.id] = undefined;

							//Delegate to ConfigurationAPI.saveModifiedTables to
							//persist the temporary version, bump affected active
							//groups, and activate them -- same pattern used by
							//FEStructure_calo.html and the standard Configure GUI.
							//
							//When lookForEquivalent=1 finds an existing persistent
							//version, savedVersion is already positive; in that
							//case saveModifiedTables would skip it (it only
							//processes negative/temporary versions). So we pass
							//the equivalent persistent version directly into
							//saveModifiedTables with a synthetic negative version
							//flag by converting it to a temporary alias that
							//sourceTableAsIs will promote back.
							//
							//Simplest correct approach: always feed
							//saveModifiedTables a negative version.  When the
							//server found an equivalent it erased our temporary
							//and returned the persistent duplicate, so we
							//re-create a temporary from that persistent version.
							if ((savedVersion | 0) >= 0)
							{
								//Server found an equivalent persistent version.
								//Create a fresh temporary copy of it so that
								//saveModifiedTables can process it normally.
								DesktopContent.XMLHttpRequest(
									"Request?RequestType=saveSpecificTable" +
									"&dataOffset=0&chunkSize=0" +
									"&tableName=" + encodeURIComponent(bareTableName) +
									"&version=" + savedVersion +
									"&lookForEquivalent=0" +
									"&temporary=1" +
									"&sourceTableAsIs=1" +
									"&tableComment=" + encodeURIComponent(comment),
									"",
									function(req2, reqParam2, errStr2)
									{
										if (errStr2) { done(false, errStr2); return; }
										var err2 = DesktopContent.getXMLValue(req2, "Error");
										if (err2)  { done(false, err2);     return; }
										var tmpVer = DesktopContent.getXMLValue(req2, "savedVersion");
										localSaveModifiedTables(tmpVer);
									},
									0, 0, true
								);
							}
							else
							{
								localSaveModifiedTables(savedVersion);
							}

							function localSaveModifiedTables(tempVersion)
							{
								ConfigurationAPI.saveModifiedTables(
									[{
										tableName:    bareTableName,
										tableVersion: tempVersion,
										tableComment: comment
									}],
									function(savedTables, savedGroups, savedAliases)
									{
										if (!savedTables.length)
										{
											done(false, "Table was saved as temporary " +
												"but failed to persist/activate.");
											return;
										}
										done(true, {
											savedVersion:    savedTables[0].tableVersion,
											foundEquivalent: !!foundEquivalent,
											rowCount:        csvRows.length,
											fileName:        fileName
										});
									});
							}
						},
						0,    //reqParam
						0,    //progressHandler
						true  //callHandlerOnErr
					);
				}); //end getTableSchema
			}); //end checkTableExistsAndGetRecords
		} //end pushCsvToMongoTable


		///////////////////////////////////////////////////////////////////////////
		// "Active" line per section: fetch the currently-active version of the
		// table and (if present) the source CSV filename from its tableComment.
		//
		// Implementation notes (verified against the server):
		//   * descriptionOnly=1 returns ONLY <TableName> + <TableDescription>;
		//     it omits <TableVersion> and <TableComment> (see
		//     ConfigurationGUISupervisor.cc:6097). So we cannot use it here.
		//   * With &version="", the server picks the latest persistent version
		//     (see ConfigurationGUISupervisor.cc:665-672) -- which is exactly
		//     the one created by saveSpecificTable on the most recent upload.
		//   * The server emits the active version as <TableVersion> (not
		//     "currentVersion" or "Version"), see line 6292. The comment is in
		//     <TableComment>, see line 6370.
		//
		// We do request the row data here (no descriptionOnly) but only because
		// the server gives us no lighter way to read the comment. For the four
		// calo tables (a few hundred rows of ~80 chars each) this is still a
		// single tens-of-KB response, much cheaper than the per-cell write loop
		// we replaced.
		///////////////////////////////////////////////////////////////////////////
		function fetchActiveTableInfo(sec, cb)
		{
			var bareTableName = sec.mongoTable.replace(/^\/+/, "");
			var reqStr =
				"Request?RequestType=getSpecificTable" +
				"&dataOffset=0" +
				"&chunkSize=0" +
				"&tableName=" + encodeURIComponent(bareTableName) +
				"&version="; //empty -> server uses latest persistent version

			DesktopContent.XMLHttpRequest(reqStr, "",
				function(req, reqParam, errStr)
				{
					if (errStr) { cb(null, errStr); return; }
					var err = DesktopContent.getXMLValue(req, "Error");
					if (err)    { cb(null, err);    return; }

					//Canonical element names emitted by handleGetTableXML.
					var version  = DesktopContent.getXMLValue(req, "TableVersion") || "";
					var comment  = DesktopContent.getXMLValue(req, "TableComment") || "";
					var fileName = extractFileNameFromComment(comment);

					if (!version)
					{
						cb(null, "No TableVersion in response.");
						return;
					}

					cb({
						version:  version,
						fileName: fileName, //null if not configured via this GUI
						comment:  comment   //full comment, for tooltip
					}, null);
				},
				0, 0, true
			);
		}

		// Render the "Active: v9 · file foo.csv" line on a section card.
		// info = { version, fileName, comment } | null (null clears to "(loading)")
		// If errStr is set, render an error pill instead.
		function updateSectionActiveLine(sec, info, errStr)
		{
			var el = document.getElementById("active-" + sec.id);
			if (!el) return;

			if (errStr)
			{
				el.className = "active-line is-error";
				el.innerHTML = 'Active: <span class="active-version">unknown</span>' +
					' <span class="active-detail">(' + escapeHtml(errStr) + ')</span>';
				el.title = errStr;
				return;
			}
			if (!info)
			{
				el.className = "active-line";
				el.innerHTML = 'Active: <span class="active-version">(loading)</span>';
				el.title = "Currently active table version (and file name if configured via this GUI)";
				return;
			}

			var verStr  = info.version ? ("v" + escapeHtml(String(info.version))) : "(unknown)";
			var fileStr = info.fileName
				? ('<span class="active-detail">file <b>' + escapeHtml(info.fileName) + '</b></span>')
				: ('<span class="active-detail is-unknown">file: not configured via this GUI</span>');

			el.className = "active-line is-known";
			el.innerHTML = 'Active: <span class="active-version">' + verStr + '</span>' +
				' &middot; ' + fileStr;
			el.title = info.comment || "";
		}

		// Refresh "Active" lines for all sections; called on init and on FSM
		// change. Each section is fetched independently so they can render in
		// parallel and one failure does not block the others.
		function refreshAllActiveLines()
		{
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
			{
				(function(sec) {
					updateSectionActiveLine(sec, null); //reset to "(loading)"
					fetchActiveTableInfo(sec, function(info, err)
					{
						if (err) updateSectionActiveLine(sec, null, err);
						else     updateSectionActiveLine(sec, info, null);
					});
				})(CONFIG_SECTIONS_[i]);
			}
		}


		///////////////////////////////////////////////////////////////////////////
		function configureAll()
		{
			var pending = [];
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
			{
				var sec = CONFIG_SECTIONS_[i];
				var val = document.getElementById("select-" + sec.id).value;
				if (val) pending.push({sec: sec, fileName: val});
			}
			if (!pending.length)
			{ Debug.log("Nothing selected.", Debug.WARN_PRIORITY); return; }

			DesktopContent.popUpVerification(
				"Upload <b>" + pending.length + "</b> selection(s) to DB?<br><br>" +
				pending.map(function(p) {
					return "&nbsp;&nbsp;\u2022 " + p.sec.title + ": <i>" +
						escapeHtml(p.fileName) + "</i>";
				}).join("<br>"),
				function()
				{
					var allBtn = document.getElementById("btn-configure-all");
					if (allBtn) allBtn.disabled = true;
					var idx = 0;
					function next() {
						if (idx >= pending.length)
						{ if (allBtn) allBtn.disabled = false; return; }
						var secId = pending[idx].sec.id;
						var btnEl = document.getElementById("btn-" + secId);
						onConfigure(secId);
						var poll = setInterval(function() {
							if (!btnEl.disabled)
							{ clearInterval(poll); idx++; next(); }
						}, 200);
					}
					next();
				},
				0,0,0,0,0,0, function(){}
			);
		}


		///////////////////////////////////////////////////////////////////////////
		function refreshAll()
		{
			modifiedTablesMap_ = {};
			_fileListCache_   = {};
			//re-run the full init flow so FSM list, CodeEditor id, and file lists
			//are all re-resolved (handles context changes, new FSMs, etc.)
			init();
		}

		function getSectionById(id)
		{
			for (var i = 0; i < CONFIG_SECTIONS_.length; ++i)
				if (CONFIG_SECTIONS_[i].id === id) return CONFIG_SECTIONS_[i];
			return null;
		}

		var _dayArr   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
		var _monthArr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
		function getDateString(d) {
			return _dayArr[d.getDay()] + " " + _monthArr[d.getMonth()] + " " +
				d.getDate() + " " + d.getHours() + ":" +
				((d.getMinutes()<10)?"0":"") + d.getMinutes() + ":" +
				((d.getSeconds()<10)?"0":"") + d.getSeconds();
		}
		function escapeHtml(s) {
			if (!s) return "";
			return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")
				.replace(/>/g,"&gt;").replace(/"/g,"&quot;");
		}

	</script>

</head>

<body onload='//init() called by DesktopContent.js'>

	<div class="header-bar">
		<h1>Calorimeter Configuration</h1>
		<div class="header-actions">
			<button class="btn-configure-all" id="btn-configure-all"
				onclick="configureAll()" title="Upload all selected files to the DB for the active FSM.">
				Upload All</button>
			<button class="btn-refresh" onclick="refreshAll()"
				title="Re-fetch FSM list, CodeEditor info, and directory contents.">
				Refresh</button>
		</div>
	</div>

	<!-- FSM section: a single bordered container that groups the FSM selector
	     with all the configuration sections it owns. -->
	<div class="fsm-section">
		<!-- Global FSM selector bar. Populated dynamically by paintFsmBar(). -->
		<div id="fsm-bar" class="fsm-bar"></div>

		<div id="display"></div>
	</div>

</body>

</html>
